<!DOCTYPE html>

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <a href ="index.html"><img src="images/logo.png" alt="INNO Fashion House Logo"></a> 
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="board.html">Board</a></li>
                <li><a href="contact.html">Inquiries</a></li>
                <li><a href="events.html">Events</a></li>
            </ul>
        </nav>
    </header>
    <marquee>Book an appointment with INNO stylists • Fashion consultations available</marquee>

    <main>

        <div class="WelcomeBanner">
                <h1 class="page-title">Inquiries & Appointments</h1>
        </div>
    <br>

        <form id="appointmentForm">

        <label>Full Name</label>
        <input type="text" id="name" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>Phone Number</label>
        <input type="tel" id="phone">

        <label>Appointment Date</label>
        <input type="date" id="date">

        <label>Appointment Time</label>
        <input type="time" id="time">

        <label>Inquiry Message</label>
        <textarea id="message"></textarea>

        <button type="submit">Submit</button>

        </form>

        <p id="formMessage"></p>

    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 INNO Fashion House. All rights reserved.</p>
        <div class="social-links">
            <a href="https://www.instagram.com/balenciaga">Instagram</a>

            <a href="https://www.x.com/balenciaga">Twitter</a>
        </div>
